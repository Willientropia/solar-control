version: '3.8'

# docker-compose para PRODUÇÃO no VPS
# Usa imagem pré-buildada do GitHub Container Registry
# O banco de dados NÃO é gerenciado aqui — ele continua rodando separadamente
# e o volume postgres_data nunca é removido por este compose.

services:
  app:
    image: ghcr.io/willientropia/solar-control:${APP_VERSION:-latest}
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - REFRESH_TOKEN_EXPIRES_DAYS=${REFRESH_TOKEN_EXPIRES_DAYS:-7}
      - BCRYPT_ROUNDS=${BCRYPT_ROUNDS:-12}
    command: sh -c "npm run db:push && node dist/index.cjs"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-soltech}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Porta comentada por segurança — acesse só via container interno
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  # IMPORTANTE: estes volumes são externos (já existem no VPS)
  # Nunca rode "docker compose down -v" — isso apaga o banco e os uploads
  postgres_data:
    external: true
    name: solar-control_postgres_data
  uploads_data:
    external: true
    name: solar-control_uploads_data
