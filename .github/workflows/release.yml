name: Build & Deploy on Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update package.json version from tag
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          npm pkg set version="$VERSION"

      - name: Set lowercase image name
        id: image
        run: echo "name=$(echo 'ghcr.io/${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            cd /opt/solar-control

            # Baixa o docker-compose.prod.yml mais recente
            REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            curl -fsSL https://raw.githubusercontent.com/${REPO}/main/docker-compose.prod.yml \
              -o docker-compose.prod.yml

            # Atualiza a variável de versão no .env
            TAG="${{ needs.build-and-push.outputs.version }}"
            sed -i "s|^APP_VERSION=.*|APP_VERSION=${TAG}|" .env || echo "APP_VERSION=${TAG}" >> .env

            # Faz pull da nova imagem
            IMAGE="${{ needs.build-and-push.outputs.image }}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${IMAGE}:${TAG}

            # Sobe apenas o container da app (não toca no DB)
            # --no-deps evita recriar o DB; nohup garante que o SSH não trava esperando
            nohup docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate app > /tmp/deploy.log 2>&1 &
            sleep 5
            cat /tmp/deploy.log

            # Remove imagens antigas
            docker image prune -f

            echo "Deploy da versão ${TAG} concluído com sucesso."
